<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STELLAR SIEGE — 星际围攻</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff006e;
    --neon-yellow: #ffd60a;
    --deep-space: #010212;
    --panel-bg: rgba(0, 245, 255, 0.04);
    --panel-border: rgba(0, 245, 255, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep-space);
    font-family: 'Share Tech Mono', monospace;
    color: var(--neon-cyan);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Starfield background */
  #starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .header {
    width: 100%;
    max-width: 700px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    position: relative;
    z-index: 10;
    border-bottom: 1px solid var(--panel-border);
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0,245,255,0.3);
  }
  .title span { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); }

  .hud {
    display: flex;
    gap: 28px;
    align-items: center;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
  }

  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hud-label { font-size: 0.6rem; color: rgba(0,245,255,0.5); letter-spacing: 0.15em; }
  .hud-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
  }

  .lives-display { display: flex; gap: 5px; }
  .life-icon { width: 14px; height: 14px; clip-path: polygon(50% 0%, 0% 100%, 100% 100%); background: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); transition: opacity 0.3s; }
  .life-icon.lost { opacity: 0.15; background: #333; box-shadow: none; }

  #game-wrap {
    position: relative;
    z-index: 10;
    margin-top: 10px;
  }

  #gameCanvas {
    display: block;
    border: 1px solid var(--panel-border);
    box-shadow:
      0 0 30px rgba(0,245,255,0.1),
      0 0 80px rgba(0,245,255,0.05),
      inset 0 0 30px rgba(0,0,0,0.5);
    background: transparent;
  }

  .footer {
    margin-top: 10px;
    font-size: 0.65rem;
    color: rgba(0,245,255,0.35);
    letter-spacing: 0.2em;
    z-index: 10;
    position: relative;
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(1, 2, 18, 0.88);
    z-index: 20;
    gap: 20px;
    backdrop-filter: blur(4px);
  }
  .overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 0.2em;
    color: var(--neon-cyan);
    text-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(0,245,255,0.4);
    animation: pulse 2s ease-in-out infinite;
  }
  .overlay-subtitle {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: rgba(0,245,255,0.55);
  }

  .start-btn {
    margin-top: 10px;
    padding: 12px 40px;
    background: transparent;
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    text-shadow: 0 0 10px var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0,245,255,0.2), inset 0 0 15px rgba(0,245,255,0.05);
  }
  .start-btn:hover {
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 30px rgba(0,245,255,0.4), inset 0 0 20px rgba(0,245,255,0.1);
    transform: scale(1.03);
  }
  .start-btn:active { transform: scale(0.98); }

  .controls-info {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(0,245,255,0.4);
    text-align: center;
    line-height: 1.9;
  }

  .game-over-score {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    color: var(--neon-yellow);
    text-shadow: 0 0 15px var(--neon-yellow);
    letter-spacing: 0.1em;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .wave-badge {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--neon-pink);
    text-shadow: 0 0 20px var(--neon-pink);
    animation: waveIn 0.5s ease-out;
  }
  @keyframes waveIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="header">
  <div class="title">STELLAR<span>SIEGE</span></div>
  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="scoreDisplay">000000</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">WAVE</span>
      <span class="hud-value" id="waveDisplay">01</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <div class="lives-display" id="livesDisplay">
        <div class="life-icon"></div>
        <div class="life-icon"></div>
        <div class="life-icon"></div>
      </div>
    </div>
  </div>
</div>

<div id="game-wrap">
  <canvas id="gameCanvas" width="680" height="520"></canvas>

  <div class="overlay" id="startScreen">
    <div class="overlay-title">STELLAR SIEGE</div>
    <div class="overlay-subtitle">星 际 围 攻</div>
    <div class="controls-info">
      ← → 方向键 / A D 键 &nbsp;移动<br>
      SPACE &nbsp;发射<br>
      P &nbsp;暂停
    </div>
    <button class="start-btn" id="startBtn">START GAME</button>
  </div>

  <div class="overlay hidden" id="gameOverScreen">
    <div class="overlay-title" style="color:var(--neon-pink);text-shadow:0 0 30px var(--neon-pink)">GAME OVER</div>
    <div class="game-over-score" id="finalScore">SCORE: 000000</div>
    <div class="overlay-subtitle" id="hiScoreMsg"></div>
    <button class="start-btn" id="restartBtn" style="border-color:var(--neon-pink);color:var(--neon-pink);text-shadow:0 0 10px var(--neon-pink);">RETRY</button>
  </div>

  <div class="overlay hidden" id="waveScreen">
    <div class="overlay-subtitle">WAVE CLEARED</div>
    <div class="wave-badge" id="nextWaveLabel">WAVE 02</div>
    <div class="overlay-subtitle" style="animation: pulse 1s infinite;">INCOMING...</div>
  </div>

  <div class="overlay hidden" id="pauseScreen">
    <div class="overlay-title" style="font-size:1.5rem">PAUSED</div>
    <div class="overlay-subtitle">按 P 继续</div>
  </div>
</div>

<div class="footer">← STELLAR SIEGE v1.0 — 用方向键移动 · SPACE发射 →</div>

<script>
// ─── STARFIELD ───────────────────────────────────────────────────────────────
const sfCanvas = document.getElementById('starfield');
const sfCtx = sfCanvas.getContext('2d');
let stars = [];
function resizeStarfield() {
  sfCanvas.width = window.innerWidth;
  sfCanvas.height = window.innerHeight;
  stars = Array.from({length: 180}, () => ({
    x: Math.random() * sfCanvas.width,
    y: Math.random() * sfCanvas.height,
    r: Math.random() * 1.4 + 0.2,
    speed: Math.random() * 0.25 + 0.05,
    opacity: Math.random() * 0.6 + 0.2
  }));
}
resizeStarfield();
window.addEventListener('resize', resizeStarfield);

function animateStars() {
  sfCtx.clearRect(0, 0, sfCanvas.width, sfCanvas.height);
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > sfCanvas.height) { s.y = 0; s.x = Math.random() * sfCanvas.width; }
    sfCtx.beginPath();
    sfCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sfCtx.fillStyle = `rgba(200,230,255,${s.opacity})`;
    sfCtx.fill();
  });
  requestAnimationFrame(animateStars);
}
animateStars();

// ─── GAME ENGINE ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// UI refs
const scoreDisplay = document.getElementById('scoreDisplay');
const waveDisplay = document.getElementById('waveDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const startScreen = document.getElementById('startScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const waveScreen = document.getElementById('waveScreen');
const pauseScreen = document.getElementById('pauseScreen');
const finalScore = document.getElementById('finalScore');
const hiScoreMsg = document.getElementById('hiScoreMsg');
const nextWaveLabel = document.getElementById('nextWaveLabel');

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = 'start'; // start | playing | paused | waveTransition | gameover
let score = 0, hiScore = 0, wave = 1, lives = 3;
let player, bullets = [], enemies = [], enemyBullets = [], particles = [], explosions = [];
let keys = {};
let shootCooldown = 0;
let enemyDir = 1, enemyDropPending = false;
let enemyShootTimer = 0;
let animId;
let waveTimer = 0;

// ─── PLAYER ──────────────────────────────────────────────────────────────────
function createPlayer() {
  return { x: W / 2, y: H - 55, w: 32, h: 28, speed: 4.5, invincible: 0 };
}

function drawPlayer(p) {
  if (p.invincible > 0 && Math.floor(p.invincible / 6) % 2 === 0) return;
  ctx.save();
  ctx.translate(p.x, p.y);

  // Engine glow
  const grad = ctx.createRadialGradient(0, 16, 0, 0, 16, 18);
  grad.addColorStop(0, 'rgba(0,245,255,0.6)');
  grad.addColorStop(1, 'rgba(0,245,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(-14, 5, 28, 24);

  // Body
  ctx.strokeStyle = '#00f5ff';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 12;
  ctx.fillStyle = 'rgba(0,245,255,0.15)';

  ctx.beginPath();
  ctx.moveTo(0, -14);
  ctx.lineTo(-16, 14);
  ctx.lineTo(-6, 8);
  ctx.lineTo(0, 12);
  ctx.lineTo(6, 8);
  ctx.lineTo(16, 14);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Cockpit
  ctx.fillStyle = 'rgba(0,245,255,0.5)';
  ctx.beginPath();
  ctx.ellipse(0, -2, 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing accents
  ctx.strokeStyle = 'rgba(255,0,110,0.7)';
  ctx.lineWidth = 1;
  ctx.shadowColor = '#ff006e';
  ctx.beginPath(); ctx.moveTo(-16, 14); ctx.lineTo(-8, 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(16, 14); ctx.lineTo(8, 5); ctx.stroke();

  ctx.restore();
}

// ─── BULLETS ─────────────────────────────────────────────────────────────────
function spawnBullet() {
  bullets.push({ x: player.x, y: player.y - 18, w: 3, h: 12, speed: 9 });
}

function drawBullet(b) {
  ctx.save();
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 10;
  const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  g.addColorStop(0, '#00f5ff');
  g.addColorStop(1, 'rgba(0,245,255,0.1)');
  ctx.fillStyle = g;
  ctx.fillRect(b.x - b.w / 2, b.y, b.w, b.h);
  ctx.restore();
}

function drawEnemyBullet(b) {
  ctx.save();
  ctx.shadowColor = '#ff006e';
  ctx.shadowBlur = 10;
  const g = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
  g.addColorStop(0, 'rgba(255,0,110,0.1)');
  g.addColorStop(1, '#ff006e');
  ctx.fillStyle = g;
  ctx.fillRect(b.x - 2, b.y, 4, 14);
  ctx.restore();
}

// ─── ENEMIES ─────────────────────────────────────────────────────────────────
const ENEMY_TYPES = [
  { color: '#ff006e', pts: 30, size: 14 },  // row 0 — boss
  { color: '#ffd60a', pts: 20, size: 12 },  // row 1-2
  { color: '#00f5ff', pts: 10, size: 11 },  // row 3-4
];

function createEnemies() {
  enemies = [];
  const cols = 10, rows = 5;
  const spacingX = 52, spacingY = 44;
  const startX = (W - (cols - 1) * spacingX) / 2;
  const startY = 55 + wave * 5;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const type = r === 0 ? 0 : r <= 2 ? 1 : 2;
      enemies.push({
        x: startX + c * spacingX,
        y: startY + r * spacingY,
        type, alive: true,
        pulse: Math.random() * Math.PI * 2
      });
    }
  }
  enemyDir = 1;
}

function drawEnemy(e) {
  if (!e.alive) return;
  const t = ENEMY_TYPES[e.type];
  const sz = t.size;
  e.pulse += 0.05;
  ctx.save();
  ctx.translate(e.x, e.y);
  ctx.shadowColor = t.color;
  ctx.shadowBlur = 10 + Math.sin(e.pulse) * 5;
  ctx.strokeStyle = t.color;
  ctx.lineWidth = 1.5;
  ctx.fillStyle = t.color + '28';

  if (e.type === 0) {
    // Boss — diamond with spikes
    ctx.beginPath();
    ctx.moveTo(0, -sz);
    ctx.lineTo(sz * 0.6, -sz * 0.3);
    ctx.lineTo(sz, 0);
    ctx.lineTo(sz * 0.6, sz * 0.3);
    ctx.lineTo(0, sz);
    ctx.lineTo(-sz * 0.6, sz * 0.3);
    ctx.lineTo(-sz, 0);
    ctx.lineTo(-sz * 0.6, -sz * 0.3);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, sz * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = t.color + '88'; ctx.fill();
  } else if (e.type === 1) {
    // Mid — crab shape
    ctx.beginPath();
    ctx.moveTo(-sz, -sz * 0.3);
    ctx.lineTo(-sz * 1.4, -sz * 0.8);
    ctx.moveTo(-sz, -sz * 0.3);
    ctx.lineTo(-sz * 1.4, sz * 0.4);
    ctx.moveTo(sz, -sz * 0.3);
    ctx.lineTo(sz * 1.4, -sz * 0.8);
    ctx.moveTo(sz, -sz * 0.3);
    ctx.lineTo(sz * 1.4, sz * 0.4);
    ctx.stroke();
    ctx.beginPath();
    ctx.roundRect(-sz, -sz * 0.5, sz * 2, sz, [sz * 0.3]);
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(-sz * 0.4, 0, sz * 0.25, 0, Math.PI * 2);
    ctx.arc(sz * 0.4, 0, sz * 0.25, 0, Math.PI * 2);
    ctx.fillStyle = t.color; ctx.fill();
  } else {
    // Basic — UFO
    ctx.beginPath();
    ctx.ellipse(0, sz * 0.2, sz, sz * 0.5, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0, -sz * 0.1, sz * 0.55, sz * 0.4, 0, 0, Math.PI * 2);
    ctx.fill(); ctx.stroke();
  }
  ctx.restore();
}

// ─── PARTICLES & EXPLOSIONS ──────────────────────────────────────────────────
function spawnExplosion(x, y, color, count = 16) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const speed = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1, decay: Math.random() * 0.04 + 0.025,
      r: Math.random() * 2.5 + 0.8,
      color
    });
  }
  explosions.push({ x, y, r: 0, maxR: 30 + Math.random() * 20, life: 1, color });
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.94; p.vy *= 0.94;
    p.life -= p.decay;
    return p.life > 0;
  });
  explosions = explosions.filter(e => {
    e.r += 2.5;
    e.life -= 0.07;
    return e.life > 0;
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
  explosions.forEach(e => {
    ctx.save();
    ctx.globalAlpha = e.life * 0.5;
    ctx.strokeStyle = e.color;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  });
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw / 2 < bx + bw / 2 && ax + aw / 2 > bx - bw / 2 &&
         ay - ah / 2 < by + bh / 2 && ay + ah / 2 > by - bh / 2;
}

// ─── HUD UPDATE ──────────────────────────────────────────────────────────────
function updateHUD() {
  scoreDisplay.textContent = String(score).padStart(6, '0');
  waveDisplay.textContent = String(wave).padStart(2, '0');
  const icons = livesDisplay.querySelectorAll('.life-icon');
  icons.forEach((icon, i) => {
    icon.classList.toggle('lost', i >= lives);
  });
}

// ─── GAME LOGIC ──────────────────────────────────────────────────────────────
function startGame() {
  score = 0; wave = 1; lives = 3;
  keys = {}; // 清空按键缓存，防止重新开始时方向键粘连
  player = createPlayer();
  bullets = []; enemyBullets = []; particles = []; explosions = [];
  createEnemies();
  enemyShootTimer = 0;
  shootCooldown = 0;
  startScreen.classList.add('hidden');
  gameOverScreen.classList.add('hidden');
  waveScreen.classList.add('hidden');
  pauseScreen.classList.add('hidden');
  state = 'playing';
  updateHUD();
  if (animId) cancelAnimationFrame(animId);
  gameLoop();
}

function getEnemySpeed() {
  const alive = enemies.filter(e => e.alive).length;
  return 0.5 + (50 - alive) * 0.06 + (wave - 1) * 0.3;
}

function updateEnemies() {
  const speed = getEnemySpeed();
  let hitWall = false;

  enemies.forEach(e => {
    if (!e.alive) return;
    e.x += speed * enemyDir;
  });

  enemies.forEach(e => {
    if (!e.alive) return;
    if (e.x > W - 20 || e.x < 20) hitWall = true;
  });

  if (hitWall) {
    enemyDir *= -1;
    enemies.forEach(e => { if (e.alive) e.y += 18; });
  }

  // Check if enemies reached player (修复：增加 state 判断)
  enemies.forEach(e => {
    if (e.alive && e.y > H - 70 && state !== 'gameover') {
      triggerGameOver();
    }
  });
}

function updateEnemyShooting() {
  const alive = enemies.filter(e => e.alive);
  if (alive.length === 0) return;
  const shootInterval = Math.max(20, 70 - wave * 8);
  enemyShootTimer++;
  if (enemyShootTimer >= shootInterval) {
    enemyShootTimer = 0;
    // Pick random alive enemy in front row per column
    const cols = {};
    alive.forEach(e => {
      const col = Math.round(e.x / 52);
      if (!cols[col] || e.y > cols[col].y) cols[col] = e;
    });
    const shooters = Object.values(cols);
    const shooter = shooters[Math.floor(Math.random() * shooters.length)];
    if (shooter) {
      enemyBullets.push({ x: shooter.x, y: shooter.y + 15, speed: 3 + wave * 0.3 });
    }
  }
}

function update() {
  // Player movement
  const spd = player.speed;
  if ((keys['ArrowLeft'] || keys['a'] || keys['A']) && player.x > 20) player.x -= spd;
  if ((keys['ArrowRight'] || keys['d'] || keys['D']) && player.x < W - 20) player.x += spd;

  // Shooting
  if (shootCooldown > 0) shootCooldown--;
  if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) && shootCooldown === 0) {
    spawnBullet();
    shootCooldown = 14;
  }

  // Player invincibility
  if (player.invincible > 0) player.invincible--;

  // Bullets
  bullets.forEach(b => b.y -= b.speed);
  bullets = bullets.filter(b => b.y > -20);

  // Enemy bullets
  enemyBullets.forEach(b => b.y += b.speed);
  

  // Enemies
  updateEnemies();
  updateEnemyShooting();

  // Bullet vs Enemy collision (修复：b.y 改为 b.y + b.h / 2)
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!e.alive) return;
      const sz = ENEMY_TYPES[e.type].size;
      if (rectsOverlap(b.x, b.y + b.h / 2, b.w, b.h, e.x, e.y, sz * 2.2, sz * 2.2)) {
        e.alive = false;
        b.y = -100;
        const pts = ENEMY_TYPES[e.type].pts;
        score += pts * wave;
        spawnExplosion(e.x, e.y, ENEMY_TYPES[e.type].color, 20);
      }
    });
  });
  bullets = bullets.filter(b => b.y > -20);

  // Enemy bullet vs Player (修复：无敌判定移入循环内，调整碰撞偏移)
  enemyBullets.forEach(b => {
    if (player.invincible === 0 && rectsOverlap(b.x, b.y + 7, 4, 14, player.x, player.y, 28, 24)) {
      b.y = H + 100;
      lives--;
      player.invincible = 90;
      spawnExplosion(player.x, player.y, '#00f5ff', 14);
      if (lives <= 0 && state !== 'gameover') triggerGameOver();
    }
  });
  enemyBullets = enemyBullets.filter(b => b.y < H + 20);

  // Wave clear?
  if (enemies.every(e => !e.alive)) {
    startWaveTransition();
  }

  updateParticles();
  updateHUD();
}

function startWaveTransition() {
  state = 'waveTransition';
  waveTimer = 0;
  wave++;
  nextWaveLabel.textContent = `WAVE ${String(wave).padStart(2, '0')}`;
  waveScreen.classList.remove('hidden');
}

function triggerGameOver() {
  state = 'gameover';
  spawnExplosion(player.x, player.y, '#00f5ff', 30);
  
  // 修复：先判断是否是新纪录
  const isNewHiScore = score > hiScore && score > 0;
  if (score > hiScore) hiScore = score;
  
  finalScore.textContent = `SCORE: ${String(score).padStart(6, '0')}`;
  hiScoreMsg.textContent = isNewHiScore ? `✦ NEW HI-SCORE: ${String(hiScore).padStart(6,'0')} ✦` : `HI-SCORE: ${String(hiScore).padStart(6,'0')}`;
  setTimeout(() => gameOverScreen.classList.remove('hidden'), 800);
}

// ─── DRAW ────────────────────────────────────────────────────────────────────
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,245,255,0.025)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();
}

function drawGround() {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,245,255,0.4)';
  ctx.shadowColor = '#00f5ff';
  ctx.shadowBlur = 8;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H - 28);
  ctx.lineTo(W, H - 28);
  ctx.stroke();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawGrid();
  drawGround();
  enemies.forEach(drawEnemy);
  bullets.forEach(drawBullet);
  enemyBullets.forEach(drawEnemyBullet);
  if (state !== 'gameover') drawPlayer(player);
  drawParticles();
}

// ─── LOOP ────────────────────────────────────────────────────────────────────
function gameLoop() {
  if (state === 'playing') {
    update();
  } else if (state === 'waveTransition') {
    waveTimer++;
    updateParticles();
    if (waveTimer >= 120) {
      waveScreen.classList.add('hidden');
      bullets = []; enemyBullets = [];
      createEnemies();
      player.invincible = 60;
      state = 'playing';
    }
  } else if (state === 'gameover') {
    updateParticles();
  }
  draw();
  animId = requestAnimationFrame(gameLoop);
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P') {
    if (state === 'playing') {
      state = 'paused';
      pauseScreen.classList.remove('hidden');
    } else if (state === 'paused') {
      state = 'playing';
      pauseScreen.classList.add('hidden');
    }
  }
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls (修复：实现按住屏幕移动时自动开火)
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  keys[' '] = true; // 按下即开火
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (touchStartX === null) return;
  const dx = e.touches[0].clientX - touchStartX;
  if (dx < -8) { keys['ArrowLeft'] = true; keys['ArrowRight'] = false; }
  else if (dx > 8) { keys['ArrowRight'] = true; keys['ArrowLeft'] = false; }
  else { keys['ArrowLeft'] = false; keys['ArrowRight'] = false; }
}, { passive: true });
canvas.addEventListener('touchend', () => {
  keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
  keys[' '] = false; // 松开即停火
  touchStartX = null;
}, { passive: true });
</script>
